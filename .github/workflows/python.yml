name: Python

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install
        run: uv sync --locked

      - name: Type check
        run: uv run ty check

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest
