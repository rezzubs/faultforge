name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-faultforge:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: ubuntu-24.04-arm
          - runner: macos-14
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/faultforge
          command: build
          args: --release --out dist --find-interpreter

      - uses: actions/upload-artifact@v4
        with:
          name: faultforge-wheel-${{ matrix.runner }}
          path: packages/faultforge/dist

  sdist-faultforge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/faultforge
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: faultforge-sdist
          path: packages/faultforge/dist

  build-faultforge-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build
        run: uv build --package faultforge-cli --out-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: faultforge-cli-dist
          path: dist

  publish-faultforge:
    needs: [build-faultforge, sdist-faultforge]
    runs-on: ubuntu-latest
    environment: pypi-faultforge
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: faultforge-wheel-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: faultforge-sdist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-faultforge-cli:
    needs: [build-faultforge-cli, publish-faultforge]
    runs-on: ubuntu-latest
    environment: pypi-faultforge-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: faultforge-cli-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  github-release:
    needs: [publish-faultforge, publish-faultforge-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: faultforge*
          path: dist
          merge-multiple: true

      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*

  update-latest-branch:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fast-forward latest branch to this tag
        run: git push origin "$GITHUB_REF_NAME:refs/heads/latest"
